name: Status Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and update status.json
        env:
          MCP_MONITOR_KEY: ${{ secrets.MCP_MONITOR_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, subprocess
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime('%Y-%m-%dT%H:%M:%SZ')
          today_str = now.strftime('%Y-%m-%d')

          import os

          def check_http(url, headers=None, ok_codes=('200',)):
              cmd = ['curl', '-s', '-o', '/dev/null', '-w', '%{http_code}', '--max-time', '10', url]
              if headers:
                  for k, v in headers.items():
                      cmd += ['-H', f'{k}: {v}']
              r = subprocess.run(cmd, capture_output=True, text=True)
              code = r.stdout.strip()
              return code, 'operational' if code in ok_codes else 'outage'

          def check_mcp(key):
              if not key:
                  print('::warning::MCP_MONITOR_KEY secret is not set — reporting MCP status as unknown')
                  return 'unknown'
              cmd = ['curl', '-s', '-o', '/dev/null', '-w', '%{http_code}', '--max-time', '10',
                     '-X', 'POST', 'https://api.morgenruf.dev/mcp',
                     '-H', f'Authorization: Bearer {key}',
                     '-H', 'Content-Type: application/json',
                     '-d', '{"jsonrpc":"2.0","method":"tools/list","id":1}']
              r = subprocess.run(cmd, capture_output=True, text=True)
              code = r.stdout.strip()
              return 'operational' if code == '200' else 'outage'

          mcp_key = os.environ.get('MCP_MONITOR_KEY', '')

          # Check each service individually
          api_code, api_status = check_http('https://api.morgenruf.dev/healthz')
          dash_code, dash_status = check_http('https://api.morgenruf.dev/dashboard', ok_codes=('200', '302'))
          mcp_status = check_mcp(mcp_key)

          print(f'API: HTTP {api_code} → {api_status}')
          print(f'Dashboard: HTTP {dash_code} → {dash_status}')
          print(f'MCP: → {mcp_status}')

          service_statuses = {
              'api': api_status,
              'dashboard': dash_status,
              'db': api_status,        # DB failing = API failing
              'scheduler': api_status, # scheduler = part of API
              'mcp': mcp_status,
          }

          overall = 'operational' if all(s == 'operational' for s in service_statuses.values()) else 'outage'

          with open('status.json') as f:
              data = json.load(f)

          data['updated_at'] = now_str
          data['overall'] = overall

          # Ensure MCP service exists
          existing_slugs = {s['slug'] for s in data['services']}
          if 'mcp' not in existing_slugs:
              data['services'].append({'name': 'MCP API', 'slug': 'mcp', 'status': 'operational', 'uptime_90d': 100.0, 'history': []})

          for svc in data['services']:
              svc['status'] = service_statuses.get(svc['slug'], overall)
              history = svc.get('history', [])
              today_entry = next((h for h in history if h['date'] == today_str), None)
              if today_entry:
                  today_entry['status'] = svc['status']
              else:
                  history.append({'date': today_str, 'status': svc['status']})
              svc['history'] = sorted(history, key=lambda x: x['date'])[-90:]
              if svc['history']:
                  up = sum(1 for h in svc['history'] if h['status'] == 'operational')
                  svc['uptime_90d'] = round(up / len(svc['history']) * 100, 2)

          with open('status.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f'Updated status.json: overall={overall}, updated_at={now_str}')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "chore: status check $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
